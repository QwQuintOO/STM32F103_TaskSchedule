version: "4.1"
name: NEW_Project
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Core
  - Drivers
  - public
virtualFolder:
  name: <virtual_root>
  files: []
  folders:
    - name: startup
      files:
        - path: startup_stm32f103xb.s
      folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: a759c68419dd62fa95b75d789d52c295
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - STM32F103xB
        - "USE_HAL_DRIVER "
      incList:
        - Core/Inc
        - Drivers/STM32F1xx_HAL_Driver/Inc/Legacy
        - Drivers/STM32F1xx_HAL_Driver/Inc
        - Drivers/CMSIS/Device/ST/STM32F1xx/Include
        - Drivers/CMSIS/Include
        - public/Inc
        - public
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            misc-control: -u_printf_float
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32F103XX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      STLink:
        address: "0x08000000"
        bin: ""
        elFile: None
        optionBytes: .eide/debug.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
    uploader: STLink
